<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Feature Flags Manager — store screenshot</title>
    <link rel="stylesheet" href="../popup.css" />
    <style>
      html,
      body {
        width: 1280px;
        height: 800px;
        margin: 0;
        overflow: hidden;
      }
      body {
        background: radial-gradient(circle at 28% 25%, #2b8ae0 0%, #0f5aa8 45%, #093b71 100%) !important;
      }
      .stage {
        width: 1280px;
        height: 800px;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 80px;
        padding: 0 96px;
      }
      .pitch {
        color: #fff;
        max-width: 560px;
      }
      .pitch .brand {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 26px;
      }
      .pitch .brand img {
        width: 60px;
        height: 60px;
        border-radius: 13px;
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.3);
      }
      .pitch h1 {
        font-size: 42px;
        line-height: 1.1;
        margin: 0;
        font-weight: 700;
        letter-spacing: -0.5px;
      }
      .pitch p.tag {
        font-size: 19px;
        line-height: 1.5;
        opacity: 0.95;
        margin: 18px 0 26px;
      }
      .pitch ul {
        font-size: 16px;
        line-height: 2;
        margin: 0;
        padding-left: 22px;
        opacity: 0.96;
      }
      .device {
        width: 400px;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 34px 90px rgba(0, 0, 0, 0.4);
        overflow: hidden;
        flex: 0 0 auto;
      }
    </style>
    <script>
      // Mock the extension APIs so popup.js renders real rows for the screenshot.
      window.chrome = {
        tabs: {
          query: function (_q, cb) {
            cb([
              {
                id: 1,
                url:
                  "https://marketplace.microsoft.com/en-us/marketplace/apps?" +
                  "exp.InlineChecks=true&feature.autoRenewalEnabled=true&" +
                  "feature.canmodifyextensions=true&feature.canmodifystamps=true&" +
                  "feature.consoletelemetry=true&feature.customportal=false&" +
                  "feature.enableSanitization=true&feature.privateOffers=true&" +
                  "includeTestProducts=true&Microsoft_Azure_Marketplace=latest&trace=diagnostics",
              },
            ]);
          },
          update: function () {},
        },
        storage: {
          local: {
            get: function (_k, cb) {
              cb({
                favorites: [
                  { name: "exp.InlineChecks", value: "true" },
                  { name: "feature.canmodifystamps", value: "true" },
                  { name: "feature.consoletelemetry", value: "true" },
                  { name: "feature.enableSanitization", value: "true" },
                  { name: "feature.privateOffers", value: "true" },
                ],
              });
            },
            set: function (_o, cb) {
              if (cb) cb();
            },
          },
        },
      };
    </script>
  </head>
  <body>
    <div class="stage">
      <div class="pitch">
        <div class="brand">
          <img src="logo-300.png" alt="" />
          <h1>Feature Flags<br />Manager</h1>
        </div>
        <p class="tag">
          View, toggle, and apply URL feature flags on any website — no more
          hand-editing the query string.
        </p>
        <ul>
          <li>Toggle flags on or off with a click</li>
          <li>Edit values inline, then hit <strong>Go!</strong></li>
          <li>Star favorites to reuse them anywhere</li>
          <li>Works on any http / https page</li>
        </ul>
      </div>

      <div class="device">
        <header class="app-header">
          <span class="app-title">Feature Flags</span>
          <span id="host-label" class="host-label"></span>
        </header>
        <div id="host-warning" class="host-warning" hidden></div>
        <div id="flag-list" class="flag-list"></div>
        <footer class="app-footer">
          <button id="add-flag" class="add-flag" type="button">
            <span class="plus">+</span> Add feature flag
          </button>
          <button id="apply" class="apply" type="button">Go!</button>
        </footer>
        <datalist id="common-values">
          <option value="true"></option>
          <option value="false"></option>
        </datalist>
      </div>
    </div>

    <script src="../popup.js"></script>
  </body>
</html>
